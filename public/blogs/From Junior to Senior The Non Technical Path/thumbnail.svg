<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <!-- Paper background -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="400" height="250" fill="#d4c4a8" opacity="0.12" filter="url(#grain)"/>
  <!-- Decorative double border -->
  <rect x="8" y="8" width="384" height="234" fill="none" stroke="#3d2614" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="222" fill="none" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Top ornamental line -->
  <line x1="40" y1="45" x2="360" y2="45" stroke="#3d2614" stroke-width="1"/>
  <circle cx="200" cy="45" r="4" fill="#3d2614"/>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Title -->
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2c2a25" letter-spacing="1">FROM JUNIOR TO SENIOR</text>
  <!-- Growth ladder -->
  <g stroke="#3d2614" stroke-width="2">
    <!-- Left rail -->
    <line x1="150" y1="105" x2="150" y2="190"/>
    <!-- Right rail -->
    <line x1="250" y1="105" x2="250" y2="190"/>
    <!-- Rungs -->
    <line x1="150" y1="115" x2="250" y2="115"/>
    <line x1="150" y1="135" x2="250" y2="135"/>
    <line x1="150" y1="155" x2="250" y2="155"/>
    <line x1="150" y1="175" x2="250" y2="175"/>
  </g>
  <!-- Rung labels -->
  <g font-family="Georgia, serif" font-size="7" fill="#5a3a1a" opacity="0.7">
    <text x="260" y="118">SENIOR</text>
    <text x="260" y="138">MID</text>
    <text x="260" y="158">JUNIOR+</text>
    <text x="260" y="178">JUNIOR</text>
  </g>
  <!-- Climbing arrow -->
  <g fill="#8b6914" opacity="0.6">
    <path d="M170,170 L180,140 L190,150 L200,120 L210,130 L220,100 L210,105 L200,115 L190,140 L180,150 L170,155 Z"/>
  </g>
  <!-- Growth arrow indicator -->
  <g fill="none" stroke="#3d2614" stroke-width="1.5" opacity="0.5">
    <path d="M120,185 L120,110"/>
    <polygon points="120,105 115,115 125,115" fill="#3d2614" opacity="0.5"/>
  </g>
  <text x="115" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#8b7355" opacity="0.7" transform="rotate(-90,115,198)">GROWTH</text>
  <!-- Subtitle -->
  <text x="200" y="207" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#5a3a1a" letter-spacing="2">THE NON-TECHNICAL PATH</text>
  <!-- Bottom ornamental line -->
  <line x1="40" y1="215" x2="360" y2="215" stroke="#3d2614" stroke-width="0.5"/>
  <line x1="40" y1="218" x2="360" y2="218" stroke="#3d2614" stroke-width="1"/>
  <polygon points="100,216 104,213 108,216 104,219" fill="#3d2614" opacity="0.6"/>
  <polygon points="292,216 296,213 300,216 296,219" fill="#3d2614" opacity="0.6"/>
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="#8b7355" letter-spacing="3">LADDER &amp; GROWTH</text>
</svg>