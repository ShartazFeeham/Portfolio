<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1500"/>
      <stop offset="100%" style="stop-color:#2d2200"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd60a"/>
      <stop offset="100%" style="stop-color:#f4a100"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4a100"/>
      <stop offset="100%" style="stop-color:#ffd60a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Radiating light from top -->
  <g opacity="0.06">
    <polygon points="200,30 120,250 280,250" fill="#ffd60a"/>
    <polygon points="200,30 150,250 250,250" fill="#ffd60a"/>
  </g>
  <!-- Star decorations -->
  <g fill="#ffd60a" opacity="0.15">
    <polygon points="50,50 53,42 56,50 53,52"/>
    <polygon points="340,35 343,27 346,35 343,37"/>
    <polygon points="370,80 372,75 374,80 372,82"/>
    <polygon points="30,100 32,95 34,100 32,102"/>
    <polygon points="350,160 353,152 356,160 353,162"/>
    <polygon points="45,180 48,172 51,180 48,182"/>
  </g>
  <!-- Ladder -->
  <g>
    <!-- Left rail -->
    <rect x="175" y="80" width="5" height="130" rx="2" fill="url(#gold)"/>
    <!-- Right rail -->
    <rect x="220" y="80" width="5" height="130" rx="2" fill="url(#gold)"/>
    <!-- Rungs with labels -->
    <rect x="175" y="90" width="50" height="5" rx="2" fill="#ffd60a" opacity="0.9"/>
    <rect x="175" y="115" width="50" height="5" rx="2" fill="#f4a100" opacity="0.75"/>
    <rect x="175" y="140" width="50" height="5" rx="2" fill="#e09600" opacity="0.6"/>
    <rect x="175" y="165" width="50" height="5" rx="2" fill="#c88200" opacity="0.45"/>
    <rect x="175" y="190" width="50" height="5" rx="2" fill="#b06e00" opacity="0.35"/>
  </g>
  <!-- Level labels -->
  <g font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffd60a" opacity="0.7">
    <text x="234" y="96">STAFF</text>
    <text x="234" y="121">SENIOR</text>
    <text x="234" y="146">MID</text>
    <text x="234" y="171">JUNIOR+</text>
    <text x="234" y="196">JUNIOR</text>
  </g>
  <!-- Climbing figure (simple person icon moving up) -->
  <g transform="translate(185,100)" fill="#ffd60a" opacity="0.85">
    <!-- Head -->
    <circle cx="10" cy="-8" r="5" fill="#ffd60a"/>
    <!-- Body -->
    <line x1="10" y1="-3" x2="10" y2="8" stroke="#ffd60a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms reaching up -->
    <line x1="10" y1="2" x2="3" y2="-5" stroke="#ffd60a" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="2" x2="17" y2="-5" stroke="#ffd60a" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="10" y1="8" x2="4" y2="16" stroke="#ffd60a" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="8" x2="16" y2="16" stroke="#ffd60a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Upward arrow -->
  <g fill="none" stroke="#ffd60a" stroke-width="2" opacity="0.4">
    <path d="M160,195 L160,85"/>
    <polygon points="160,80 155,90 165,90" fill="#ffd60a" stroke="none" opacity="0.4"/>
  </g>
  <text x="155" y="210" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#ffd60a" opacity="0.4" transform="rotate(-90,155,210)" letter-spacing="2">GROWTH</text>
  <!-- Title -->
  <text x="200" y="38" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#fff3b0" letter-spacing="1">FROM JUNIOR TO SENIOR</text>
  <text x="200" y="56" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="10" fill="#f4a100" letter-spacing="2" opacity="0.8">THE NON-TECHNICAL PATH</text>
  <!-- Bottom accent line -->
  <rect x="130" y="222" width="140" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="150" y="228" width="100" height="18" rx="9" fill="#ffd60a" opacity="0.1"/>
  <text x="200" y="241" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#ffd60a" letter-spacing="2">CAREER</text>
</svg>