<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="100%" style="stop-color:#3d1045"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e040a0"/>
      <stop offset="100%" style="stop-color:#ff69b4"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040a0;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ff69b4;stop-opacity:0.03"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <rect x="60" y="70" width="280" height="130" rx="4" fill="url(#grid)"/>
  <g stroke="#e040a0" stroke-width="0.4" opacity="0.15">
    <line x1="60" y1="90" x2="340" y2="90"/>
    <line x1="60" y1="110" x2="340" y2="110"/>
    <line x1="60" y1="130" x2="340" y2="130"/>
    <line x1="60" y1="150" x2="340" y2="150"/>
    <line x1="60" y1="170" x2="340" y2="170"/>
    <line x1="60" y1="190" x2="340" y2="190"/>
    <line x1="100" y1="70" x2="100" y2="200"/>
    <line x1="140" y1="70" x2="140" y2="200"/>
    <line x1="180" y1="70" x2="180" y2="200"/>
    <line x1="220" y1="70" x2="220" y2="200"/>
    <line x1="260" y1="70" x2="260" y2="200"/>
    <line x1="300" y1="70" x2="300" y2="200"/>
  </g>
  <!-- Observer Pattern Diagram -->
  <!-- Subject box -->
  <rect x="170" y="82" width="60" height="24" rx="4" fill="#3d1045" stroke="#ff69b4" stroke-width="1.5"/>
  <text x="200" y="98" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff69b4">Subject</text>
  <!-- Connection lines -->
  <g stroke="#e040a0" stroke-width="1.2" opacity="0.6">
    <line x1="182" y1="106" x2="115" y2="138"/>
    <line x1="200" y1="106" x2="200" y2="138"/>
    <line x1="218" y1="106" x2="285" y2="138"/>
  </g>
  <!-- Arrow tips -->
  <g fill="#e040a0" opacity="0.6">
    <polygon points="115,138 109,133 113,128"/>
    <polygon points="200,138 194,133 206,133"/>
    <polygon points="285,138 287,128 291,133"/>
  </g>
  <!-- Observer boxes -->
  <rect x="85" y="140" width="58" height="24" rx="4" fill="#3d1045" stroke="#e040a0" stroke-width="1.2"/>
  <text x="114" y="156" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff69b4">Observer</text>
  <rect x="171" y="140" width="58" height="24" rx="4" fill="#3d1045" stroke="#ff69b4" stroke-width="1.2"/>
  <text x="200" y="156" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff69b4">Observer</text>
  <rect x="257" y="140" width="58" height="24" rx="4" fill="#3d1045" stroke="#e040a0" stroke-width="1.2"/>
  <text x="286" y="156" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff69b4">Observer</text>
  <!-- UML class box at left -->
  <g transform="translate(72,80)">
    <rect x="0" y="0" width="40" height="30" rx="2" fill="#3d1045" stroke="#e040a0" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="12" x2="40" y2="12" stroke="#e040a0" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="10" text-anchor="middle" font-family="monospace" font-size="5" fill="#ff69b4" opacity="0.6">class</text>
    <text x="20" y="24" text-anchor="middle" font-family="monospace" font-size="5" fill="#e040a0" opacity="0.5">+run()</text>
  </g>
  <!-- Singleton icon at right -->
  <g transform="translate(305,82)">
    <rect x="0" y="0" width="30" height="26" rx="2" fill="#3d1045" stroke="#ff69b4" stroke-width="0.8" opacity="0.5"/>
    <text x="15" y="10" text-anchor="middle" font-family="monospace" font-size="5" fill="#ff69b4" opacity="0.6">1</text>
    <text x="15" y="20" text-anchor="middle" font-family="monospace" font-size="5" fill="#e040a0" opacity="0.5">inst</text>
  </g>
  <!-- Title -->
  <text x="200" y="38" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffc0e0" letter-spacing="1.5">DESIGN PATTERNS</text>
  <text x="200" y="55" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="9" fill="#e040a0" letter-spacing="2" opacity="0.7">EVERY DEVELOPER SHOULD KNOW</text>
  <!-- Bottom accent line -->
  <rect x="120" y="210" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="140" y="218" width="120" height="18" rx="9" fill="#e040a0" opacity="0.12"/>
  <text x="200" y="231" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#ff69b4" letter-spacing="2">BLUEPRINT</text>
</svg>