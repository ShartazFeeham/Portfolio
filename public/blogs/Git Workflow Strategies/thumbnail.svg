<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
  <defs>
    <linearGradient id="gbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1B5E20" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="250" height="250" rx="12" fill="url(#gbg)"/>
  <rect width="250" height="250" rx="12" fill="url(#glow)"/>
  <!-- Grid dots for tech feel -->
  <g fill="#4CAF50" opacity="0.1">
    <circle cx="25" cy="25" r="2"/><circle cx="50" cy="25" r="2"/><circle cx="75" cy="25" r="2"/><circle cx="100" cy="25" r="2"/><circle cx="125" cy="25" r="2"/><circle cx="150" cy="25" r="2"/><circle cx="175" cy="25" r="2"/><circle cx="200" cy="25" r="2"/><circle cx="225" cy="25" r="2"/>
    <circle cx="25" cy="50" r="2"/><circle cx="50" cy="50" r="2"/><circle cx="75" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="125" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="175" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="225" cy="50" r="2"/>
  </g>
  <!-- Main branch (vertical center line) -->
  <line x1="125" y1="30" x2="125" y2="220" stroke="#69F0AE" stroke-width="4" stroke-linecap="round"/>
  <!-- Main branch commits -->
  <circle cx="125" cy="45" r="8" fill="#0D3311" stroke="#69F0AE" stroke-width="3"/>
  <circle cx="125" cy="90" r="8" fill="#0D3311" stroke="#69F0AE" stroke-width="3"/>
  <circle cx="125" cy="180" r="8" fill="#0D3311" stroke="#69F0AE" stroke-width="3"/>
  <circle cx="125" cy="215" r="8" fill="#69F0AE" stroke="#B9F6CA" stroke-width="2"/>
  <!-- Feature branch left -->
  <path d="M125,90 Q90,110 65,120 Q40,130 55,155 Q70,170 125,180" fill="none" stroke="#FF6D00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="65" cy="120" r="6" fill="#0D3311" stroke="#FF6D00" stroke-width="2.5"/>
  <circle cx="55" cy="145" r="6" fill="#0D3311" stroke="#FF6D00" stroke-width="2.5"/>
  <!-- Feature branch right -->
  <path d="M125,90 Q160,100 185,115 Q210,130 195,160 Q180,175 125,180" fill="none" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
  <circle cx="185" cy="115" r="6" fill="#0D3311" stroke="#FFD600" stroke-width="2.5"/>
  <circle cx="197" cy="145" r="6" fill="#0D3311" stroke="#FFD600" stroke-width="2.5"/>
  <!-- Hotfix branch -->
  <path d="M125,180 L80,195 L125,215" fill="none" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,3"/>
  <circle cx="80" cy="195" r="5" fill="#0D3311" stroke="#FF1744" stroke-width="2"/>
  <!-- Labels -->
  <text x="140" y="50" font-family="monospace" font-size="10" fill="#B9F6CA">main</text>
  <text x="20" y="124" font-family="monospace" font-size="9" fill="#FF6D00">feature</text>
  <text x="198" y="119" font-family="monospace" font-size="9" fill="#FFD600">develop</text>
  <text x="50" y="210" font-family="monospace" font-size="8" fill="#FF1744">hotfix</text>
  <!-- Title bar -->
  <rect x="30" y="228" width="190" height="16" rx="4" fill="#0D3311" opacity="0.6"/>
  <text x="125" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#69F0AE" text-anchor="middle" letter-spacing="1.5">GIT WORKFLOW</text>
</svg>