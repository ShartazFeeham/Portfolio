<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <!-- Paper background -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="400" height="250" fill="#d4c4a8" opacity="0.12" filter="url(#grain)"/>
  <!-- Decorative double border -->
  <rect x="8" y="8" width="384" height="234" fill="none" stroke="#3d2614" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="222" fill="none" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Top ornamental line -->
  <line x1="40" y1="45" x2="360" y2="45" stroke="#3d2614" stroke-width="1"/>
  <circle cx="200" cy="45" r="4" fill="#3d2614"/>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Title -->
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2c2a25" letter-spacing="1">BUILDING EVENT-DRIVEN</text>
  <text x="200" y="96" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2c2a25" letter-spacing="1">SYSTEMS</text>
  <!-- Event bus (horizontal line) -->
  <line x1="60" y1="140" x2="340" y2="140" stroke="#3d2614" stroke-width="2.5"/>
  <text x="200" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#3d2614" opacity="0.6">EVENT BUS</text>
  <!-- Producer nodes (top) -->
  <g fill="#3d2614" opacity="0.15" stroke="#3d2614" stroke-width="1">
    <rect x="75" y="108" width="40" height="22" rx="3"/>
    <rect x="165" y="108" width="40" height="22" rx="3"/>
    <rect x="255" y="108" width="40" height="22" rx="3"/>
  </g>
  <!-- Producer labels -->
  <g font-family="Georgia, serif" font-size="6.5" fill="#3d2614" text-anchor="middle" opacity="0.7">
    <text x="95" y="123">Order</text>
    <text x="185" y="123">Payment</text>
    <text x="275" y="123">Shipping</text>
  </g>
  <!-- Down arrows from producers to bus -->
  <g fill="#3d2614" opacity="0.5">
    <polygon points="95,130 91,135 99,135"/>
    <polygon points="185,130 181,135 189,135"/>
    <polygon points="275,130 271,135 279,135"/>
  </g>
  <!-- Consumer nodes (bottom) -->
  <g fill="#3d2614" opacity="0.15" stroke="#3d2614" stroke-width="1">
    <rect x="75" y="150" width="40" height="22" rx="3"/>
    <rect x="165" y="150" width="40" height="22" rx="3"/>
    <rect x="255" y="150" width="40" height="22" rx="3"/>
  </g>
  <!-- Consumer labels -->
  <g font-family="Georgia, serif" font-size="6.5" fill="#3d2614" text-anchor="middle" opacity="0.7">
    <text x="95" y="165">Notify</text>
    <text x="185" y="165">Analytics</text>
    <text x="275" y="165">Audit</text>
  </g>
  <!-- Down arrows from bus to consumers -->
  <g fill="#3d2614" opacity="0.5">
    <polygon points="95,145 91,150 99,150"/>
    <polygon points="185,145 181,150 189,150"/>
    <polygon points="275,145 271,150 279,150"/>
  </g>
  <!-- Flow arrows along bus -->
  <g fill="#8b6914" opacity="0.5">
    <polygon points="140,137 148,140 140,143"/>
    <polygon points="230,137 238,140 230,143"/>
  </g>
  <!-- Bottom ornamental line -->
  <line x1="40" y1="200" x2="360" y2="200" stroke="#3d2614" stroke-width="0.5"/>
  <line x1="40" y1="203" x2="360" y2="203" stroke="#3d2614" stroke-width="1"/>
  <polygon points="100,201 104,198 108,201 104,204" fill="#3d2614" opacity="0.6"/>
  <polygon points="292,201 296,198 300,201 296,204" fill="#3d2614" opacity="0.6"/>
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="#8b7355" letter-spacing="3">EVENTS &amp; FLOW</text>
</svg>