<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <!-- Paper background -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="400" height="250" fill="#d4c4a8" opacity="0.12" filter="url(#grain)"/>
  <!-- Decorative double border -->
  <rect x="8" y="8" width="384" height="234" fill="none" stroke="#3d2614" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="222" fill="none" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Top ornamental line -->
  <line x1="40" y1="45" x2="360" y2="45" stroke="#3d2614" stroke-width="1"/>
  <circle cx="200" cy="45" r="4" fill="#3d2614"/>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Title -->
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2c2a25" letter-spacing="1">PSYCHOLOGY OF</text>
  <text x="200" y="96" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2c2a25" letter-spacing="1">CODE REVIEWS</text>
  <!-- Left person (author) -->
  <g transform="translate(120,140)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <!-- Head -->
    <circle cx="0" cy="-25" r="12"/>
    <!-- Body -->
    <path d="M-15,0 Q0,-10 15,0 L10,25 L-10,25 Z"/>
    <!-- Arms -->
    <line x1="-15" y1="5" x2="-25" y2="15"/>
    <line x1="15" y1="5" x2="25" y2="15"/>
  </g>
  <!-- Right person (reviewer) -->
  <g transform="translate(280,140)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <!-- Head -->
    <circle cx="0" cy="-25" r="12"/>
    <!-- Body -->
    <path d="M-15,0 Q0,-10 15,0 L10,25 L-10,25 Z"/>
    <!-- Arms -->
    <line x1="-15" y1="5" x2="-25" y2="15"/>
    <line x1="15" y1="5" x2="25" y2="15"/>
  </g>
  <!-- Magnifying glass (review) between them -->
  <g transform="translate(200,135)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <circle cx="0" cy="0" r="15"/>
    <line x1="11" y1="11" x2="22" y2="22"/>
  </g>
  <!-- Code diff lines inside magnifying glass -->
  <g opacity="0.5">
    <line x1="190" y1="128" x2="210" y2="128" stroke="#5a8a1a" stroke-width="1.5"/>
    <line x1="190" y1="133" x2="205" y2="133" stroke="#8b3a1a" stroke-width="1.5"/>
    <line x1="190" y1="138" x2="210" y2="138" stroke="#5a8a1a" stroke-width="1.5"/>
  </g>
  <!-- Thought bubble connection -->
  <g fill="none" stroke="#8b6914" stroke-width="1" stroke-dasharray="2,2" opacity="0.5">
    <path d="M140,130 Q170,120 185,130"/>
    <path d="M215,130 Q230,120 260,130"/>
  </g>
  <!-- Subtitle -->
  <text x="200" y="195" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#5a3a1a" letter-spacing="2">MINDS &amp; CODE</text>
  <!-- Bottom ornamental line -->
  <line x1="40" y1="200" x2="360" y2="200" stroke="#3d2614" stroke-width="0.5"/>
  <line x1="40" y1="203" x2="360" y2="203" stroke="#3d2614" stroke-width="1"/>
  <polygon points="100,201 104,198 108,201 104,204" fill="#3d2614" opacity="0.6"/>
  <polygon points="292,201 296,198 300,201 296,204" fill="#3d2614" opacity="0.6"/>
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="#8b7355" letter-spacing="3">PEOPLE &amp; PSYCHOLOGY</text>
</svg>