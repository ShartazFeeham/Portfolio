<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <!-- Paper background -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="400" height="250" fill="#d4c4a8" opacity="0.12" filter="url(#grain)"/>
  <!-- Decorative double border -->
  <rect x="8" y="8" width="384" height="234" fill="none" stroke="#3d2614" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="222" fill="none" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Top ornamental line -->
  <line x1="40" y1="45" x2="360" y2="45" stroke="#3d2614" stroke-width="1"/>
  <circle cx="200" cy="45" r="4" fill="#3d2614"/>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Title -->
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#2c2a25" letter-spacing="1">DATABASE INDEXING</text>
  <!-- Database cylinder -->
  <g transform="translate(155,135)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <ellipse cx="0" cy="-25" rx="35" ry="10"/>
    <line x1="-35" y1="-25" x2="-35" y2="25"/>
    <line x1="35" y1="-25" x2="35" y2="25"/>
    <ellipse cx="0" cy="25" rx="35" ry="10"/>
    <!-- Data rows inside -->
    <line x1="-25" y1="-15" x2="25" y2="-15" stroke-width="0.8" opacity="0.5"/>
    <line x1="-25" y1="-5" x2="25" y2="-5" stroke-width="0.8" opacity="0.5"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke-width="0.8" opacity="0.5"/>
    <line x1="-25" y1="15" x2="25" y2="15" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Index pointer arrow -->
  <g fill="#8b6914" opacity="0.7">
    <line x1="220" y1="110" x2="195" y2="120" stroke="#8b6914" stroke-width="1.5"/>
    <polygon points="195,120 202,118 198,112"/>
  </g>
  <!-- B-Tree structure -->
  <g transform="translate(290,100)" fill="none" stroke="#3d2614" stroke-width="1.2">
    <!-- Root node -->
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#3d2614" opacity="0.15"/>
    <!-- Left child -->
    <rect x="-30" y="18" width="20" height="14" rx="2" fill="#3d2614" opacity="0.1"/>
    <!-- Right child -->
    <rect x="10" y="18" width="20" height="14" rx="2" fill="#3d2614" opacity="0.1"/>
    <!-- Edges -->
    <line x1="-6" y1="8" x2="-20" y2="18"/>
    <line x1="6" y1="8" x2="20" y2="18"/>
    <!-- Leaf nodes -->
    <rect x="-40" y="42" width="16" height="12" rx="1" fill="#3d2614" opacity="0.08"/>
    <rect x="-18" y="42" width="16" height="12" rx="1" fill="#3d2614" opacity="0.08"/>
    <rect x="8" y="42" width="16" height="12" rx="1" fill="#3d2614" opacity="0.08"/>
    <rect x="30" y="42" width="16" height="12" rx="1" fill="#3d2614" opacity="0.08"/>
    <line x1="-24" y1="32" x2="-32" y2="42"/>
    <line x1="-16" y1="32" x2="-10" y2="42"/>
    <line x1="16" y1="32" x2="16" y2="42"/>
    <line x1="24" y1="32" x2="38" y2="42"/>
  </g>
  <!-- Subtitle -->
  <text x="200" y="190" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#5a3a1a" letter-spacing="2">A COMPLETE GUIDE</text>
  <!-- Bottom ornamental line -->
  <line x1="40" y1="200" x2="360" y2="200" stroke="#3d2614" stroke-width="0.5"/>
  <line x1="40" y1="203" x2="360" y2="203" stroke="#3d2614" stroke-width="1"/>
  <polygon points="100,201 104,198 108,201 104,204" fill="#3d2614" opacity="0.6"/>
  <polygon points="292,201 296,198 300,201 296,204" fill="#3d2614" opacity="0.6"/>
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="#8b7355" letter-spacing="3">TABLES &amp; BTREE INDEXES</text>
</svg>