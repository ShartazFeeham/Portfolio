<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c0a00"/>
      <stop offset="100%" style="stop-color:#3d1300"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff9f1c"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Data grid dots -->
  <g fill="#ff6b35" opacity="0.08">
    <circle cx="40" cy="40" r="2"/><circle cx="70" cy="40" r="2"/><circle cx="100" cy="40" r="2"/><circle cx="130" cy="40" r="2"/>
    <circle cx="160" cy="40" r="2"/><circle cx="190" cy="40" r="2"/><circle cx="220" cy="40" r="2"/><circle cx="250" cy="40" r="2"/>
    <circle cx="280" cy="40" r="2"/><circle cx="310" cy="40" r="2"/><circle cx="340" cy="40" r="2"/><circle cx="370" cy="40" r="2"/>
    <circle cx="40" cy="70" r="2"/><circle cx="70" cy="70" r="2"/><circle cx="100" cy="70" r="2"/><circle cx="130" cy="70" r="2"/>
    <circle cx="160" cy="70" r="2"/><circle cx="190" cy="70" r="2"/><circle cx="220" cy="70" r="2"/><circle cx="250" cy="70" r="2"/>
    <circle cx="280" cy="70" r="2"/><circle cx="310" cy="70" r="2"/><circle cx="340" cy="70" r="2"/><circle cx="370" cy="70" r="2"/>
    <circle cx="40" cy="200" r="2"/><circle cx="70" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="130" cy="200" r="2"/>
    <circle cx="160" cy="200" r="2"/><circle cx="190" cy="200" r="2"/><circle cx="220" cy="200" r="2"/><circle cx="250" cy="200" r="2"/>
    <circle cx="280" cy="200" r="2"/><circle cx="310" cy="200" r="2"/><circle cx="340" cy="200" r="2"/><circle cx="370" cy="200" r="2"/>
    <circle cx="40" cy="230" r="2"/><circle cx="70" cy="230" r="2"/><circle cx="100" cy="230" r="2"/><circle cx="130" cy="230" r="2"/>
    <circle cx="160" cy="230" r="2"/><circle cx="190" cy="230" r="2"/><circle cx="220" cy="230" r="2"/><circle cx="250" cy="230" r="2"/>
    <circle cx="280" cy="230" r="2"/><circle cx="310" cy="230" r="2"/><circle cx="340" cy="230" r="2"/><circle cx="370" cy="230" r="2"/>
  </g>
  <!-- Database cylinder -->
  <g transform="translate(150,135)">
    <ellipse cx="0" cy="-30" rx="38" ry="12" fill="none" stroke="#ff6b35" stroke-width="1.8"/>
    <line x1="-38" y1="-30" x2="-38" y2="30" stroke="#ff6b35" stroke-width="1.8"/>
    <line x1="38" y1="-30" x2="38" y2="30" stroke="#ff6b35" stroke-width="1.8"/>
    <ellipse cx="0" cy="30" rx="38" ry="12" fill="none" stroke="#ff6b35" stroke-width="1.8"/>
    <!-- Data rows -->
    <line x1="-28" y1="-18" x2="28" y2="-18" stroke="#ff9f1c" stroke-width="0.8" opacity="0.5"/>
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="#ff9f1c" stroke-width="0.8" opacity="0.5"/>
    <line x1="-28" y1="2" x2="28" y2="2" stroke="#ff9f1c" stroke-width="0.8" opacity="0.5"/>
    <line x1="-28" y1="12" x2="28" y2="12" stroke="#ff9f1c" stroke-width="0.8" opacity="0.5"/>
    <line x1="-28" y1="22" x2="28" y2="22" stroke="#ff9f1c" stroke-width="0.8" opacity="0.5"/>
    <!-- Highlight row -->
    <rect x="-30" y="-12" width="60" height="8" rx="1" fill="#ff6b35" opacity="0.15"/>
  </g>
  <!-- B-Tree structure -->
  <g transform="translate(300,110)" fill="none" stroke="#ff9f1c" stroke-width="1.2">
    <!-- Root -->
    <rect x="-14" y="-10" width="28" height="18" rx="3" fill="#ff6b35" opacity="0.15" stroke="#ff6b35"/>
    <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="7" fill="#ff9f1c">root</text>
    <!-- Left child -->
    <rect x="-32" y="22" width="22" height="16" rx="3" fill="#ff6b35" opacity="0.1" stroke="#ff9f1c"/>
    <!-- Right child -->
    <rect x="10" y="22" width="22" height="16" rx="3" fill="#ff6b35" opacity="0.1" stroke="#ff9f1c"/>
    <!-- Edges -->
    <line x1="-7" y1="8" x2="-21" y2="22" stroke="#ff9f1c" stroke-width="1"/>
    <line x1="7" y1="8" x2="21" y2="22" stroke="#ff9f1c" stroke-width="1"/>
    <!-- Leaf nodes -->
    <rect x="-42" y="50" width="16" height="13" rx="2" fill="#ff9f1c" opacity="0.08" stroke="#ff9f1c" stroke-width="0.8"/>
    <rect x="-20" y="50" width="16" height="13" rx="2" fill="#ff9f1c" opacity="0.08" stroke="#ff9f1c" stroke-width="0.8"/>
    <rect x="8" y="50" width="16" height="13" rx="2" fill="#ff9f1c" opacity="0.08" stroke="#ff9f1c" stroke-width="0.8"/>
    <rect x="30" y="50" width="16" height="13" rx="2" fill="#ff9f1c" opacity="0.08" stroke="#ff9f1c" stroke-width="0.8"/>
    <line x1="-26" y1="38" x2="-34" y2="50" stroke="#ff9f1c" stroke-width="0.8"/>
    <line x1="-16" y1="38" x2="-12" y2="50" stroke="#ff9f1c" stroke-width="0.8"/>
    <line x1="16" y1="38" x2="16" y2="50" stroke="#ff9f1c" stroke-width="0.8"/>
    <line x1="26" y1="38" x2="38" y2="50" stroke="#ff9f1c" stroke-width="0.8"/>
  </g>
  <!-- Arrow from DB to B-Tree -->
  <g fill="#ff9f1c" stroke="#ff9f1c" stroke-width="1.5" opacity="0.7">
    <line x1="192" y1="120" x2="268" y2="100"/>
    <polygon points="266,96 274,100 266,104" fill="#ff9f1c" stroke="none"/>
  </g>
  <!-- Title -->
  <text x="200" y="42" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffcdb2" letter-spacing="1.5">DATABASE INDEXING</text>
  <!-- Subtitle -->
  <text x="200" y="195" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#ff9f1c" letter-spacing="2.5" opacity="0.8">A COMPLETE GUIDE</text>
  <!-- Bottom accent line -->
  <rect x="120" y="210" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="140" y="218" width="120" height="18" rx="9" fill="#ff6b35" opacity="0.12"/>
  <text x="200" y="231" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#ff9f1c" letter-spacing="2">B-TREE INDEX</text>
</svg>