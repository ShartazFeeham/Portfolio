<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <radialGradient id="tcircle" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#B2DFDB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00695C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="250" height="250" rx="12" fill="url(#tbg)"/>
  <rect width="250" height="250" rx="12" fill="url(#tcircle)"/>
  <!-- Decorative rings -->
  <circle cx="125" cy="105" r="72" fill="none" stroke="#B2DFDB" stroke-width="1" opacity="0.15"/>
  <circle cx="125" cy="105" r="85" fill="none" stroke="#B2DFDB" stroke-width="0.5" opacity="0.1"/>
  <!-- Main circle -->
  <circle cx="125" cy="105" r="58" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.9"/>
  <!-- Checkmark -->
  <polyline points="97,105 117,125 155,82" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle glow behind checkmark -->
  <polyline points="97,105 117,125 155,82" fill="none" stroke="#B2DFDB" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
  <!-- Test code lines -->
  <g opacity="0.7">
    <rect x="45" y="178" width="160" height="50" rx="6" fill="#004D40" opacity="0.6"/>
    <text x="55" y="196" font-family="monospace" font-size="9" fill="#80CBC4">describe(</text>
    <text x="108" y="196" font-family="monospace" font-size="9" fill="#A7FFEB">'UserService'</text>
    <text x="55" y="210" font-family="monospace" font-size="9" fill="#80CBC4">  it(</text>
    <text x="76" y="210" font-family="monospace" font-size="9" fill="#A7FFEB">'should validate'</text>
    <text x="55" y="224" font-family="monospace" font-size="9" fill="#80CBC4">    expect(result)</text>
  </g>
  <!-- Green dot indicators -->
  <circle cx="38" cy="185" r="4" fill="#69F0AE"/>
  <circle cx="38" cy="199" r="4" fill="#69F0AE"/>
  <circle cx="38" cy="213" r="4" fill="#69F0AE"/>
  <!-- Title -->
  <rect x="40" y="235" width="170" height="12" rx="3" fill="#004D40" opacity="0.5"/>
  <text x="125" y="245" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">UNIT TESTS</text>
</svg>