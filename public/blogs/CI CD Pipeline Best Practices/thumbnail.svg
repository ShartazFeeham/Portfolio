<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="pgreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
    <linearGradient id="pblue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="12" fill="url(#pbg)"/>
  <!-- Subtle grid -->
  <g stroke="#42A5F5" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="250"/><line x1="160" y1="0" x2="160" y2="250"/>
    <line x1="240" y1="0" x2="240" y2="250"/><line x1="320" y1="0" x2="320" y2="250"/>
  </g>
  <!-- Pipeline stages -->
  <!-- Stage 1: Code/Commit -->
  <rect x="25" y="60" width="65" height="65" rx="10" fill="#0D47A1" stroke="#42A5F5" stroke-width="2"/>
  <text x="57" y="88" font-family="monospace" font-size="20" fill="#42A5F5" text-anchor="middle">&lt;/&gt;</text>
  <text x="57" y="118" font-family="Arial, sans-serif" font-size="8" fill="#90CAF9" text-anchor="middle">Code</text>
  <!-- Arrow 1 -->
  <line x1="95" y1="92" x2="115" y2="92" stroke="url(#pgreen)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="115,86 125,92 115,98" fill="#69F0AE"/>
  <!-- Stage 2: Build -->
  <rect x="128" y="60" width="65" height="65" rx="10" fill="#0D47A1" stroke="#42A5F5" stroke-width="2"/>
  <rect x="148" y="76" width="25" height="20" rx="3" fill="none" stroke="#69F0AE" stroke-width="2"/>
  <line x1="148" y1="83" x2="173" y2="83" stroke="#69F0AE" stroke-width="1.5"/>
  <line x1="148" y1="89" x2="173" y2="89" stroke="#69F0AE" stroke-width="1.5"/>
  <text x="160" y="118" font-family="Arial, sans-serif" font-size="8" fill="#90CAF9" text-anchor="middle">Build</text>
  <!-- Arrow 2 -->
  <line x1="198" y1="92" x2="218" y2="92" stroke="url(#pgreen)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="218,86 228,92 218,98" fill="#69F0AE"/>
  <!-- Stage 3: Test -->
  <rect x="231" y="60" width="65" height="65" rx="10" fill="#0D47A1" stroke="#42A5F5" stroke-width="2"/>
  <circle cx="263" cy="86" r="12" fill="none" stroke="#69F0AE" stroke-width="2"/>
  <polyline points="255,86 261,93 273,79" fill="none" stroke="#69F0AE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="263" y="118" font-family="Arial, sans-serif" font-size="8" fill="#90CAF9" text-anchor="middle">Test</text>
  <!-- Arrow 3 -->
  <line x1="301" y1="92" x2="320" y2="92" stroke="url(#pgreen)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="320,86 330,92 320,98" fill="#69F0AE"/>
  <!-- Stage 4: Deploy -->
  <rect x="333" y="60" width="50" height="65" rx="10" fill="#0D47A1" stroke="url(#pgreen)" stroke-width="2.5"/>
  <polygon points="358,76 345,90 365,90" fill="#69F0AE" opacity="0.8"/>
  <rect x="350" y="90" width="16" height="8" rx="2" fill="#69F0AE" opacity="0.8"/>
  <text x="358" y="118" font-family="Arial, sans-serif" font-size="8" fill="#69F0AE" text-anchor="middle" font-weight="bold">Deploy</text>
  <!-- Flowing data particles -->
  <circle cx="105" cy="85" r="2.5" fill="#69F0AE" opacity="0.7"/>
  <circle cx="208" cy="88" r="2" fill="#69F0AE" opacity="0.6"/>
  <circle cx="312" cy="90" r="2.5" fill="#69F0AE" opacity="0.7"/>
  <!-- Bottom status bar -->
  <rect x="25" y="145" width="358" height="30" rx="6" fill="#0D47A1" opacity="0.5"/>
  <circle cx="45" cy="160" r="6" fill="#69F0AE"/>
  <text x="60" y="164" font-family="monospace" font-size="9" fill="#69F0AE">Pipeline #247 passed</text>
  <text x="310" y="164" font-family="monospace" font-size="9" fill="#90CAF9">3m 42s</text>
  <!-- Title -->
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">CI / CD PIPELINE</text>
  <text x="200" y="228" font-family="Arial, sans-serif" font-size="10" fill="#90CAF9" text-anchor="middle" letter-spacing="1">BEST PRACTICES</text>
  <!-- Accent bar -->
  <rect x="100" y="238" width="200" height="4" rx="2" fill="url(#pgreen)" opacity="0.5"/>
</svg>