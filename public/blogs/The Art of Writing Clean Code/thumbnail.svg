<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#c77dff"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d4edd"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Code line decorations -->
  <g opacity="0.15">
    <rect x="40" y="60" width="80" height="4" rx="2" fill="#c77dff"/>
    <rect x="40" y="72" width="120" height="4" rx="2" fill="#9d4edd"/>
    <rect x="40" y="84" width="60" height="4" rx="2" fill="#7b2ff7"/>
    <rect x="40" y="96" width="100" height="4" rx="2" fill="#c77dff"/>
    <rect x="280" y="170" width="80" height="4" rx="2" fill="#c77dff"/>
    <rect x="260" y="182" width="100" height="4" rx="2" fill="#9d4edd"/>
    <rect x="270" y="194" width="70" height="4" rx="2" fill="#7b2ff7"/>
  </g>
  <!-- Left bracket -->
  <g fill="none" stroke="#9d4edd" stroke-width="3" opacity="0.3">
    <path d="M60,80 L45,100 L60,120"/>
  </g>
  <!-- Right bracket -->
  <g fill="none" stroke="#9d4edd" stroke-width="3" opacity="0.3">
    <path d="M340,80 L355,100 L340,120"/>
  </g>
  <!-- Central pen icon -->
  <g transform="translate(200,135) rotate(-30)">
    <!-- Pen body -->
    <rect x="-5" y="-50" width="10" height="55" rx="3" fill="url(#pen)"/>
    <!-- Pen nib -->
    <polygon points="-5,5 5,5 0,22" fill="#7b2ff7"/>
    <!-- Nib detail -->
    <line x1="0" y1="5" x2="0" y2="18" stroke="#1a0a2e" stroke-width="1"/>
    <!-- Pen top -->
    <rect x="-6" y="-55" width="12" height="8" rx="2" fill="#c77dff"/>
    <!-- Pen clip -->
    <rect x="5" y="-48" width="3" height="30" rx="1" fill="#c77dff" opacity="0.7"/>
    <!-- Ink drop from nib -->
    <ellipse cx="0" cy="28" rx="5" ry="7" fill="#c77dff" opacity="0.4"/>
    <!-- Small ink splatter -->
    <circle cx="-8" cy="35" r="2" fill="#9d4edd" opacity="0.3"/>
    <circle cx="6" cy="38" r="1.5" fill="#c77dff" opacity="0.25"/>
  </g>
  <!-- Sparkle effects -->
  <g fill="#e0aaff" opacity="0.6">
    <polygon points="130,65 132,60 134,65 132,67" transform="rotate(15,132,63)"/>
    <polygon points="280,55 282,50 284,55 282,57" transform="rotate(-10,282,53)"/>
    <polygon points="310,150 312,145 314,150 312,152" transform="rotate(20,312,148)"/>
    <polygon points="90,170 92,165 94,170 92,172" transform="rotate(-15,92,168)"/>
  </g>
  <!-- Title -->
  <text x="200" y="42" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#e0aaff" letter-spacing="1">THE ART OF WRITING</text>
  <!-- Subtitle -->
  <text x="200" y="62" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#c77dff" letter-spacing="2">CLEAN CODE</text>
  <!-- Bottom accent line -->
  <rect x="130" y="215" width="140" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="155" y="222" width="90" height="18" rx="9" fill="#7b2ff7" opacity="0.15"/>
  <text x="200" y="235" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#c77dff" letter-spacing="2">CLEAN CODE</text>
</svg>