<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2027"/>
      <stop offset="100%" style="stop-color:#1a4731"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#56e39f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Circuit board traces -->
  <g stroke="#2ec4b6" stroke-width="0.8" fill="none" opacity="0.2">
    <path d="M30,60 L80,60 L80,100 L130,100"/>
    <path d="M270,60 L320,60 L320,100 L370,100"/>
    <path d="M30,190 L80,190 L80,150 L130,150"/>
    <path d="M270,190 L320,190 L320,150 L370,150"/>
    <path d="M50,125 L100,125"/>
    <path d="M300,125 L350,125"/>
    <path d="M200,30 L200,70"/>
    <path d="M200,180 L200,220"/>
  </g>
  <!-- Junction dots -->
  <g fill="#2ec4b6" opacity="0.4">
    <circle cx="80" cy="60" r="2.5"/>
    <circle cx="320" cy="60" r="2.5"/>
    <circle cx="80" cy="190" r="2.5"/>
    <circle cx="320" cy="190" r="2.5"/>
    <circle cx="100" cy="125" r="2.5"/>
    <circle cx="300" cy="125" r="2.5"/>
    <circle cx="200" cy="70" r="2.5"/>
    <circle cx="200" cy="180" r="2.5"/>
  </g>
  <!-- Microservice nodes -->
  <g filter="url(#glow)">
    <rect x="120" y="85" width="48" height="36" rx="6" fill="#0f3d2e" stroke="#2ec4b6" stroke-width="1.5"/>
    <rect x="176" y="107" width="48" height="36" rx="6" fill="#0f3d2e" stroke="#56e39f" stroke-width="1.5"/>
    <rect x="232" y="85" width="48" height="36" rx="6" fill="#0f3d2e" stroke="#2ec4b6" stroke-width="1.5"/>
    <rect x="148" y="140" width="48" height="36" rx="6" fill="#0f3d2e" stroke="#56e39f" stroke-width="1.5"/>
    <rect x="204" y="140" width="48" height="36" rx="6" fill="#0f3d2e" stroke="#2ec4b6" stroke-width="1.5"/>
  </g>
  <!-- Service icons inside nodes -->
  <g fill="#2ec4b6" opacity="0.6">
    <!-- Gear icon -->
    <circle cx="144" cy="103" r="6" fill="none" stroke="#2ec4b6" stroke-width="1"/>
    <circle cx="144" cy="103" r="2.5"/>
    <!-- Circuit breaker icon -->
    <path d="M195,120 L207,120 L207,130 L195,130 Z" fill="none" stroke="#56e39f" stroke-width="1"/>
    <line x1="201" y1="120" x2="201" y2="126" stroke="#56e39f" stroke-width="1"/>
    <circle cx="201" cy="128" r="1.5" fill="#56e39f"/>
    <!-- API icon -->
    <text x="256" y="107" text-anchor="middle" font-family="monospace" font-size="7" fill="#2ec4b6">API</text>
    <!-- Shield -->
    <path d="M168,148 L180,143 L192,148 L192,158 L180,166 L168,158 Z" fill="none" stroke="#56e39f" stroke-width="1"/>
    <!-- DB icon -->
    <ellipse cx="228" cy="151" rx="8" ry="4" fill="none" stroke="#2ec4b6" stroke-width="1"/>
    <line x1="220" y1="151" x2="220" y2="163" stroke="#2ec4b6" stroke-width="1"/>
    <line x1="236" y1="151" x2="236" y2="163" stroke="#2ec4b6" stroke-width="1"/>
    <ellipse cx="228" cy="163" rx="8" ry="4" fill="none" stroke="#2ec4b6" stroke-width="1"/>
  </g>
  <!-- Connection lines between nodes -->
  <g stroke="#2ec4b6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5">
    <line x1="168" y1="103" x2="176" y2="115"/>
    <line x1="224" y1="115" x2="232" y2="103"/>
    <line x1="172" y1="140" x2="176" y2="130"/>
    <line x1="228" y1="140" x2="224" y2="130"/>
    <line x1="196" y1="140" x2="200" y2="143"/>
  </g>
  <!-- Title -->
  <text x="200" y="42" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#b8f0e0" letter-spacing="1.5">RESILIENT MICROSERVICES</text>
  <!-- Subtitle -->
  <text x="200" y="205" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="11" fill="#2ec4b6" letter-spacing="2" opacity="0.8">WITH SPRING BOOT</text>
  <!-- Bottom accent line -->
  <rect x="120" y="220" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="145" y="228" width="110" height="18" rx="9" fill="#2ec4b6" opacity="0.12"/>
  <text x="200" y="241" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="7" fill="#56e39f" letter-spacing="2">RESILIENCE</text>
</svg>