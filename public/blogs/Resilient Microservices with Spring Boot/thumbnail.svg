<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <!-- Paper background -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  <rect width="400" height="250" fill="#d4c4a8" opacity="0.12" filter="url(#grain)"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <!-- Decorative double border -->
  <rect x="8" y="8" width="384" height="234" fill="none" stroke="#3d2614" stroke-width="2"/>
  <rect x="14" y="14" width="372" height="222" fill="none" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Top ornamental line -->
  <line x1="40" y1="45" x2="360" y2="45" stroke="#3d2614" stroke-width="1"/>
  <circle cx="200" cy="45" r="4" fill="#3d2614"/>
  <line x1="40" y1="48" x2="360" y2="48" stroke="#3d2614" stroke-width="0.5"/>
  <!-- Title text -->
  <text x="200" y="80" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" fill="#2c2a25" letter-spacing="1">RESILIENT MICROSERVICES</text>
  <!-- Central gear -->
  <g transform="translate(200,138)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <circle r="22"/>
    <circle r="12" fill="#3d2614" opacity="0.15"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-22" x2="0" y2="-28"/>
    <line x1="19" y1="-11" x2="24" y2="-14"/>
    <line x1="19" y1="11" x2="24" y2="14"/>
    <line x1="0" y1="22" x2="0" y2="28"/>
    <line x1="-19" y1="11" x2="-24" y2="14"/>
    <line x1="-19" y1="-11" x2="-24" y2="-14"/>
    <circle r="5" fill="#3d2614" opacity="0.3"/>
  </g>
  <!-- Circuit breaker symbol (shield) -->
  <g transform="translate(120,138)" fill="none" stroke="#3d2614" stroke-width="1.5">
    <path d="M0,-20 L15,-10 L15,8 L0,20 L-15,8 L-15,-10 Z"/>
    <line x1="-6" y1="-4" x2="6" y2="-4"/>
    <line x1="0" y1="-4" x2="0" y2="8"/>
    <circle cx="0" cy="8" r="3" fill="#3d2614" opacity="0.3"/>
  </g>
  <!-- Second small gear -->
  <g transform="translate(280,138)" fill="none" stroke="#3d2614" stroke-width="1.2">
    <circle r="16"/>
    <circle r="8" fill="#3d2614" opacity="0.15"/>
    <line x1="0" y1="-16" x2="0" y2="-21"/>
    <line x1="14" y1="-8" x2="18" y2="-10"/>
    <line x1="14" y1="8" x2="18" y2="10"/>
    <line x1="0" y1="16" x2="0" y2="21"/>
    <line x1="-14" y1="8" x2="-18" y2="10"/>
    <line x1="-14" y1="-8" x2="-18" y2="-10"/>
    <circle r="4" fill="#3d2614" opacity="0.3"/>
  </g>
  <!-- Connection lines between elements -->
  <g stroke="#8b6914" stroke-width="1" stroke-dasharray="3,3" opacity="0.6">
    <line x1="135" y1="138" x2="178" y2="138"/>
    <line x1="222" y1="138" x2="264" y2="138"/>
  </g>
  <!-- Subtitle -->
  <text x="200" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#5a3a1a" letter-spacing="2">WITH SPRING BOOT</text>
  <!-- Bottom ornamental line -->
  <line x1="40" y1="200" x2="360" y2="200" stroke="#3d2614" stroke-width="0.5"/>
  <line x1="40" y1="203" x2="360" y2="203" stroke="#3d2614" stroke-width="1"/>
  <polygon points="100,201 104,198 108,201 104,204" fill="#3d2614" opacity="0.6"/>
  <polygon points="292,201 296,198 300,201 296,204" fill="#3d2614" opacity="0.6"/>
  <text x="200" y="228" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="#8b7355" letter-spacing="3">CIRCUIT BREAKERS &amp; RESILIENCE</text>
</svg>